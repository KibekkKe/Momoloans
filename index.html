<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo Loan Application</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #ffcc00;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 400px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .logo {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #ffcc00;
    margin-bottom: 10px;
  }

  h2 {
    text-align: center;
    color: #333;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  button {
    width: 100%;
    padding: 14px;
    background: #ffcc00;
    color: black;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #e6b800;
  }

  .note {
    font-size: 12px;
    text-align: center;
    color: gray;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="container">
  <div class="logo">MTN MoMo Uganda</div>
  <h2>Loan Application</h2>

  <form action="/apply" method="POST">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="text" name="phone" placeholder="Phone Number (07XXXXXXXX)" required>

    <select name="network" required>
      <option value="">Select Network</option>
      <option value="MTN">MTN</option>
      <option value="Airtel">Airtel</option>
    </select>

    <input type="number" name="amount" placeholder="Loan Amount (UGX)" required>
    <input type="text" name="nationalId" placeholder="National ID Number" required>

    <button type="submit">Apply Now</button>
  </form>

  <div class="note">
    Ensure your details are correct before submitting.
  </div>
</div>

</body>
</html>
